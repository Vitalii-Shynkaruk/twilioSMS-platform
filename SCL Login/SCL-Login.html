<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SCL — Sales Command Layer</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #020712;
    }

    .screen {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      background: #020712;
    }

    .stage {
      position: relative;
      width: 1440px;
      height: 900px;
      max-width: 100vw;
      max-height: 100vh;
      overflow: hidden;
    }

    .bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      image-rendering: -webkit-optimize-contrast;
      transform: translateZ(0);
      user-select: none;
      pointer-events: none;
    }

    .edge-effects {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .edge {
      position: absolute;
      opacity: 0;
      filter: drop-shadow(0 0 6px currentColor);
    }

    .top-blue {
      top: 2.7%;
      left: 5.1%;
      width: 220px;
      height: 2px;
      color: #2aa8ff;
      background: linear-gradient(90deg, transparent, #2aa8ff, white, transparent);
      animation: scanBlue 5.2s infinite;
    }

    .top-gold {
      top: 2.7%;
      right: 7.7%;
      width: 260px;
      height: 2px;
      color: #d9a34b;
      background: linear-gradient(90deg, transparent, #d9a34b, #ffd98a, transparent);
      animation: scanGoldTop 6.4s infinite;
    }

    .right-gold {
      top: 4%;
      right: 2.8%;
      width: 2px;
      height: 200px;
      color: #d9a34b;
      background: linear-gradient(180deg, transparent, #d9a34b, #ffd98a, transparent);
      animation: scanGoldRight 6.8s infinite;
    }

    .bottom-gold {
      bottom: 2.9%;
      right: 8%;
      width: 320px;
      height: 2px;
      color: #d9a34b;
      background: linear-gradient(90deg, transparent, #d9a34b, #ffd98a, transparent);
      animation: scanGoldBottom 7.2s infinite;
    }

    .button-glow {
      position: absolute;
      left: 50%;
      top: 66.2%;
      width: 507px;
      height: 60px;
      transform: translateX(-50%);
      border-radius: 7px;
      z-index: 2;
      pointer-events: none;
      opacity: 0;
      box-shadow: 0 0 24px rgba(8, 116, 255, .55);
      animation: buttonPulse 4.8s ease-in-out infinite;
    }

    .hotspots {
      position: absolute;
      left: 50%;
      top: 58.2%;
      transform: translate(-50%, -50%);
      width: 507px;
      height: 200px;
      z-index: 3;
    }

    input {
      position: absolute;
      top: 48px;
      width: 100%;
      height: 52px;
      padding-left: 54px;
      border: none;
      outline: none;
      background: transparent;
      color: #eef4ff;
      font-size: 16px;
      font-family: Arial, sans-serif;
      caret-color: #2aa8ff;
    }

    input::placeholder {
      color: transparent;
    }

    input:focus {
      background: rgba(42, 168, 255, .035);
      box-shadow: inset 0 0 18px rgba(42, 168, 255, .08);
      border-radius: 7px;
    }

    button {
      position: absolute;
      top: 124px;
      width: 100%;
      height: 60px;
      border: none;
      background: transparent;
      cursor: pointer;
      border-radius: 7px;
    }

    button:hover {
      background: rgba(255, 255, 255, .025);
      box-shadow: 0 0 22px rgba(8, 116, 255, .22);
    }

    @keyframes scanBlue {
      0%,80%,100% { opacity: 0; transform: translateX(-20px); }
      85% { opacity: .9; transform: translateX(40px); }
      90% { opacity: .2; }
    }

    @keyframes scanGoldTop {
      0%,75%,100% { opacity: 0; transform: translateX(40px); }
      80% { opacity: .8; transform: translateX(-40px); }
      85% { opacity: .2; }
    }

    @keyframes scanGoldRight {
      0%,78%,100% { opacity: 0; transform: translateY(-20px); }
      83% { opacity: .7; transform: translateY(30px); }
      88% { opacity: .2; }
    }

    @keyframes scanGoldBottom {
      0%,70%,100% { opacity: 0; transform: translateX(60px); }
      75% { opacity: .7; transform: translateX(-50px); }
      80% { opacity: .2; }
    }

    @keyframes buttonPulse {
      0%, 100% { opacity: 0; }
      48% { opacity: 0; }
      54% { opacity: .28; }
      62% { opacity: .08; }
      70% { opacity: 0; }
    }

    @media (max-width: 900px) {
      .stage {
        width: 100vw;
        height: calc(100vw * 0.625);
        max-height: 100vh;
      }

      .hotspots,
      .button-glow {
        width: 35.2%;
      }
    }
  </style>
</head>

<body>
  <main class="screen">
    <div class="stage">
      <img class="bg" src="./SCL-Login-BG.png" alt="SCL Login">

      <div class="edge-effects">
        <span class="edge top-blue"></span>
        <span class="edge top-gold"></span>
        <span class="edge right-gold"></span>
        <span class="edge bottom-gold"></span>
      </div>

      <div class="button-glow"></div>

      <form class="hotspots">
        <input type="email" autocomplete="email" aria-label="Email address">
        <button type="button" aria-label="Send code"></button>
      </form>
    </div>
  </main>
</body>
</html>
